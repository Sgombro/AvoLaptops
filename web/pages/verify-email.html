<!DOCTYPE html>
<html>
<head>
    <title>Verifica Email - AvoLaptops</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; margin: 20px; max-width: 500px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; font-size: 18px; text-align: center; letter-spacing: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .info { color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Verifica Email</h1>
    <div id="email-info" class="info">Inserisci il codice di verifica inviato alla tua email.</div>
    
    <form id="verifyForm">
        <div class="form-group">
            <label>Codice di Verifica (6 cifre):</label>
            <input type="text" id="verification-code" maxlength="6" pattern="[0-9]{6}" required placeholder="000000">
        </div>
        <button type="submit">Verifica</button>
    </form>
    <div id="messaggio"></div>
    
    <p><a href="login.html">Torna al login</a></p>
    
    <!-- Script JS esterni -->
    <script src="../js/config.js"></script>
    <script src="../js/verify-email.js"></script>
</body>
</html>
